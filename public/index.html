<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UML — My Memory</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
	:root {
		--bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2b333f; --border2:#3a4452;
		--text:#e6edf3; --muted:#8b949e; --faint:#6e7681; --accent:#58a6ff; --green:#3fb950;
		--amber:#d29922; --red:#f85149; --purple:#bc8cff;
	}
	*{box-sizing:border-box}
	html,body{height:100%}
	body{margin:0;font:13.5px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
	code{font-family:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace}
	header{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--border)}
	h1{font-size:15px;margin:0;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap}
	input,select{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:6px 9px;border-radius:7px;font-size:13px;outline:none}
	input:focus,select:focus{border-color:var(--accent)}
	input#userId{width:130px} input#key{width:120px}
	button{background:var(--accent);color:#04121f;border:0;padding:6px 12px;border-radius:7px;font-weight:650;cursor:pointer;font-size:12.5px}
	button:hover{filter:brightness(1.08)}
	button.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border2)}
	button.ghost:hover{border-color:var(--accent);filter:none}
	button.mini{padding:3px 8px;font-size:11px}
	button.icon{width:24px;height:24px;padding:0;display:inline-grid;place-items:center;border-radius:6px}
	button.danger{background:#3a1d1b;color:#ffb4ad;border:1px solid rgba(248,81,73,.5)}
	button.danger:hover{border-color:var(--red);filter:none}
	.spacer{flex:1}
	.stats{display:flex;gap:7px;flex-wrap:wrap}
	.stat{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:baseline}
	.stat b{color:var(--text);font-size:14px}
	main{flex:1;display:grid;grid-template-columns:248px minmax(0,1fr) 0;min-height:0;overflow:hidden;transition:grid-template-columns .15s}
	main.detail-open{grid-template-columns:248px minmax(0,1fr) 340px}
	aside,.detail{background:var(--panel);overflow-y:auto;min-height:0}
	aside{border-right:1px solid var(--border);padding:12px}
	.detail{border-left:1px solid var(--border);padding:14px}
	.content{min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
	.tabs{display:flex;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg)}
	.tab{background:transparent;color:var(--muted);border:1px solid transparent;padding:5px 11px;border-radius:7px;font-weight:650}
	.tab:hover{color:var(--text);background:var(--panel2)}
	.tab.active{color:var(--text);background:var(--panel2);border-color:var(--border2)}
	.view{flex:1;overflow:auto;padding:14px;min-height:0}
	.view.pad0{padding:0}
	.side-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:14px 2px 7px;display:flex;justify-content:space-between;align-items:center}
	.side-h:first-child{margin-top:2px}
	.nl-item{padding:7px 9px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;border:1px solid transparent}
	.nl-item:hover{background:var(--panel2)}
	.nl-item.sel{background:var(--panel2);border-color:var(--accent)}
	.nl-item .lbl{font-weight:650;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	.nl-item .meta{font-size:10.5px;color:var(--faint)}
	.nl-item .row-actions{display:flex;gap:4px;opacity:.45}
	.nl-item:hover .row-actions{opacity:1}
	.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
	.cand{padding:5px 9px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);margin:4px 0;font-size:12px;display:flex;justify-content:space-between;gap:8px}
	.badge{font-size:10.5px;padding:2px 8px;border-radius:999px;font-weight:700;text-transform:capitalize;white-space:nowrap}
	.state-active{background:#14391f;color:var(--green)}
	.state-inactive,.state-junk{background:#3a1d1b;color:var(--red)}
	.state-paused{background:#3a2f12;color:var(--amber)}
	.state-completed{background:#1b2a4a;color:var(--accent)}
	.imp-life_significant{background:#3a1d1b;color:var(--red)}
	.imp-important{background:#3a2f12;color:var(--amber)}
	.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:999px;padding:2px 9px}
	.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
	.card{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:13px;cursor:pointer;transition:border-color .12s}
	.card:hover{border-color:var(--accent)}
	.card .top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
	.card .title{font-size:15.5px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	.card .cat{font-size:11px;color:var(--faint);text-transform:capitalize;margin-bottom:8px}
	.card .summary{color:var(--muted);font-size:12.5px;margin-bottom:8px;font-style:italic}
	.card .mini-line{font-size:11.5px;color:var(--muted);margin:2px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
	.card .counts{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
	.card.page{border-left:3px solid var(--accent)}
	table{width:100%;border-collapse:collapse;font-size:12.5px}
	th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
	th{color:var(--faint);font-weight:650;text-transform:uppercase;font-size:10.5px;letter-spacing:.05em;position:sticky;top:0;background:var(--bg)}
	tr.click{cursor:pointer} tr.click:hover td{background:var(--panel2)}
	.detail h2{font-size:18px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
	.detail .sub{color:var(--faint);text-transform:capitalize;font-size:12px;margin-bottom:10px}
	.d-sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:16px 0 7px;border-bottom:1px solid var(--border);padding-bottom:4px}
	.slice,.event,.edge-row{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin:5px 0;font-size:12.5px}
	.slice.old{opacity:.5}
	.slice .k,.event .when{font-size:10.5px;color:var(--faint);display:block;margin-top:2px}
	.timeline-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
	.timeline-item .tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
	.tl-main{flex:1;min-width:0}.tl-node{font-weight:700;cursor:pointer}.tl-node:hover{color:var(--accent)}.tl-when{font-size:11px;color:var(--faint);white-space:nowrap}
	.receipt{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:9px;padding:11px 13px;margin-bottom:9px}
	.receipt.zero{border-left-color:var(--faint)}.receipt .r-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:4px}.receipt .r-src{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.03em}.receipt .r-when{font-size:11px;color:var(--faint);white-space:nowrap}
	#graphWrap{position:relative;height:100%;min-height:520px;overflow:hidden;isolation:isolate;background:linear-gradient(135deg,rgba(88,166,255,.11),transparent 28%),linear-gradient(225deg,rgba(188,140,255,.12),transparent 30%),linear-gradient(180deg,#111722 0%,#0b1018 58%,#090d13 100%)}
	#graphWrap::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,#000 0%,transparent 92%)}
	#graph{position:absolute;inset:0;z-index:1;min-height:520px}
	.graph-tools{position:absolute;top:14px;right:14px;display:flex;gap:7px;z-index:5;flex-wrap:wrap;justify-content:flex-end}
	.graph-tools input{width:150px;background:rgba(22,27,34,.86);backdrop-filter:blur(8px)}
	.graph-tools select,.graph-tools .mini{background:rgba(22,27,34,.82);backdrop-filter:blur(8px);box-shadow:0 10px 26px rgba(0,0,0,.22)}
	.legend{position:absolute;right:14px;bottom:14px;display:flex;flex-wrap:wrap;justify-content:flex-end;gap:5px 10px;background:rgba(13,17,23,.76);backdrop-filter:blur(10px);border:1px solid rgba(139,148,158,.22);border-radius:9px;padding:8px 11px;max-width:min(720px,calc(100% - 28px));z-index:5;box-shadow:0 12px 38px rgba(0,0,0,.28)}
	.legend span{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted)}
	.graph-err{position:absolute;inset:0;z-index:4;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--muted)}
	.graph-empty{max-width:380px;padding:22px 24px;border:1px solid rgba(139,148,158,.24);border-radius:12px;background:rgba(13,17,23,.72);box-shadow:0 18px 44px rgba(0,0,0,.28)}
	.empty{color:var(--faint);font-style:italic;padding:18px;text-align:center}
	.help{color:var(--muted);font-size:12.5px}
	.box{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:14px;max-width:760px}
	.box h3{margin:0 0 10px;font-size:14px}
	.mcp-url{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;color:var(--accent)}
	.steps{margin:8px 0 0;padding-left:18px}.steps li{margin:4px 0;color:var(--muted)}
	.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
	.test-btn{text-align:left;background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:11px 13px;border-radius:9px;font-weight:650}
	.test-btn small{display:block;color:var(--faint);font-weight:400;margin-top:3px;font-size:11px}
	#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center}
	.toast{background:var(--panel);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:9px;padding:10px 15px;font-size:13px;max-width:620px;box-shadow:0 8px 30px #0008;white-space:pre-wrap}.toast.err{border-left-color:var(--red)}
	.banner{background:#3a1d1b;color:#ffb4ad;border:1px solid var(--red);border-radius:8px;padding:9px 13px;margin:10px 14px;display:none}.kv{color:var(--muted)}.kv b{color:var(--text);font-weight:650}
	.page-md{white-space:pre-wrap;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12.5px;max-height:360px;overflow:auto}
	@media(max-width:900px){main,main.detail-open{grid-template-columns:210px minmax(0,1fr)}.detail{position:fixed;inset:auto 0 0 0;max-height:46vh;z-index:20;border-left:0;border-top:1px solid var(--border);box-shadow:0 -18px 40px rgba(0,0,0,.35)}main:not(.detail-open) .detail{display:none}.legend{left:14px;right:14px;justify-content:flex-start}#graphWrap,#graph{min-height:460px}}
</style>
</head>
<body>
<header>
	<h1><span>🧠</span> UML</h1>
	<input id="userId" placeholder="userId" autocomplete="off" />
	<input id="key" type="password" placeholder="API key" autocomplete="off" />
	<button id="load">Load</button>
	<button class="ghost" id="copyMcp">Copy MCP URL</button>
	<div class="spacer"></div>
	<div class="stats" id="stats"></div>
</header>
<div class="banner" id="banner"></div>
<main id="main">
	<aside>
		<div class="side-h"><span>Memory Pages</span><span id="pageCount" class="kv"></span></div>
		<div id="pageList"></div>
		<div class="side-h"><span>Nodes</span><span id="nlCount" class="kv"></span></div>
		<div id="nodeList"></div>
		<div class="side-h" style="margin-top:18px"><span>Candidates</span><span id="candCount" class="kv"></span></div>
		<div id="candList"></div>
	</aside>
	<div class="content">
		<div class="tabs" id="tabs">
			<button class="tab active" data-view="graph">Graph</button>
			<button class="tab" data-view="cards">Cards</button>
			<button class="tab" data-view="table">Table</button>
			<button class="tab" data-view="timeline">Timeline</button>
			<button class="tab" data-view="saves">Saves</button>
			<button class="tab" data-view="test">Test</button>
			<button class="tab" data-view="setup">Setup</button>
			<button class="tab" data-view="dev">Model</button>
		</div>
		<div class="view pad0" id="view"></div>
	</div>
	<div class="detail" id="detail"></div>
</main>
<div id="toast"></div>
<script>
const $ = (s, r=document) => r.querySelector(s);
const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[m]));
const fmtDate = (ms) => { if (!ms) return ""; const d = new Date(Number(ms)); return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); };
const ago = (ms) => { const s=(Date.now()-Number(ms))/1000; if(!ms)return""; if(s<60)return"just now"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; };
const CAT_COLORS = { person:"#ff8ec7",family:"#ff7ab6",relationship:"#ff7b72",project:"#bc8cff",system:"#79c0ff",tool:"#56d364",skill:"#f2cc60",habit:"#d29922",health:"#ff6b6b",goal:"#3fb950",preference:"#f0883e",identity:"#ffa657",life_event:"#ff9bce",place:"#7ee787",organization:"#d2a8ff",possession:"#9aa5b1",interest:"#f0883e",other:"#8b949e" };
const CLUSTER_FALLBACK = {
	identity_career:{label:"Identity & Career",color:"#58a6ff",layout:{x:-620,y:-300,radiusX:240,radiusY:170}},
	active_goals:{label:"Active Goals",color:"#f0883e",layout:{x:0,y:-330,radiusX:240,radiusY:170}},
	life_family:{label:"Life & Family",color:"#ff7ab6",layout:{x:620,y:-300,radiusX:240,radiusY:170}},
	projects_systems:{label:"Projects & Systems",color:"#bc8cff",layout:{x:-380,y:90,radiusX:280,radiusY:190}},
	skills_tech:{label:"Skillset & Tech",color:"#a371f7",layout:{x:390,y:90,radiusX:250,radiusY:175}},
	fitness_habits:{label:"Fitness & Habits",color:"#7ee787",layout:{x:-620,y:465,radiusX:240,radiusY:170}},
	preferences_research:{label:"Preferences & Research",color:"#d29922",layout:{x:0,y:500,radiusX:270,radiusY:185}},
	general_memory:{label:"General Memory",color:"#8b949e",layout:{x:620,y:465,radiusX:240,radiusY:170}}
};
const VALID_MODES = ["clean","all","focus","debug"];
function catColor(c){ return CAT_COLORS[c] || CAT_COLORS.other; }
function clusterInfo(id){ return (S.data?.clusters || []).find(c => c.id === id) || CLUSTER_FALLBACK[id] || CLUSTER_FALLBACK.general_memory; }
function clusterColor(id){ return clusterInfo(id).color || "#8b949e"; }
function normalizeSearch(s){ return String(s || "").toLowerCase().replace(/\s+/g," ").trim(); }
function stop(e){ e.stopPropagation(); e.preventDefault(); }
const S = {
	userId:localStorage.getItem("uml_user") || "",
	key:localStorage.getItem("uml_key") || "",
	view:"graph",
	graphMode:localStorage.getItem("uml_graph_mode") || "clean",
	data:null, receipts:[], selected:null, network:null, graphNodes:null, graphEdges:null,
	resizeObserver:null, fitTimer:null
};
if (!VALID_MODES.includes(S.graphMode)) S.graphMode = "clean";
const nodeKey = (id) => `node:${id}`;
const pageKey = (id) => `page:${id}`;
const itemKey = (kind,id) => (kind === "page" || kind === "memory_page" ? pageKey(id) : nodeKey(id));
function selectedNode(){ const key=String(S.selected||""); const id=key.startsWith("node:")?key.slice(5):key; return S.data && S.data.nodes.find(n=>n.id===id); }
function selectedPage(){ const key=String(S.selected||""); if(!key.startsWith("page:")) return null; return S.data && (S.data.pages||[]).find(p=>p.id===key.slice(5)); }
$("#userId").value = S.userId; $("#key").value = S.key;
function toast(msg,isErr){ const t=el("div","toast"+(isErr?" err":""),esc(msg)); $("#toast").appendChild(t); setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(()=>t.remove(),400);},isErr?6500:4300); }
function banner(msg){ const b=$("#banner"); if(!msg){b.style.display="none";return;} b.textContent=msg; b.style.display="block"; }
function mcpToken(){ try{return btoa(`${S.userId}:${S.key}`).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}catch{return"";} }
function mcpUrl(){ return `${location.origin}/mcp/${mcpToken()}`; }
async function api(path,opts={}){
	const res = await fetch(path,{...opts,headers:{"x-api-key":S.key,"content-type":"application/json",...(opts.headers||{})}});
	if(!res.ok){ const t=await res.text().catch(()=> ""); throw new Error(`${res.status} ${t.slice(0,160)}`); }
	return res.json();
}
async function load(){
	S.userId=$("#userId").value.trim(); S.key=$("#key").value.trim();
	localStorage.setItem("uml_user",S.userId); localStorage.setItem("uml_key",S.key);
	if(!S.userId || !S.key){ banner("Enter a userId and API key, then press Load."); return; }
	banner("");
	try{
		const [graph,receipts] = await Promise.all([
			api(`/v1/graph?userId=${encodeURIComponent(S.userId)}&mode=${encodeURIComponent(S.graphMode)}`),
			api(`/v1/receipts?userId=${encodeURIComponent(S.userId)}`).catch(()=>({receipts:[]}))
		]);
		S.data=graph; S.receipts=receipts.receipts || [];
		if(S.selected && !graph.nodes.find(n=>nodeKey(n.id)===S.selected) && !(graph.pages||[]).find(p=>pageKey(p.id)===S.selected)) S.selected=null;
		renderAll();
		toast(`Loaded ${(graph.pages||[]).length} page(s), ${graph.nodes.length} node(s) · ${S.graphMode} view.`);
	}catch(e){ banner("Load failed: " + e.message); }
}
function renderAll(){ renderStats(); renderPageList(); renderNodeList(); renderCandidates(); renderView(); renderDetail(); }
function renderStats(){
	const s=(S.data&&S.data.stats)||{pages:0,nodes:0,slices:0,events:0,edges:0,candidates:0,clusters:0};
	$("#stats").innerHTML=[["pages",s.pages||0],["nodes",s.nodes||0],["clusters",s.clusters||0],["slices",s.slices||0],["events",s.events||0],["edges",s.edges||0],["candidates",s.candidates||0]]
		.map(([k,v])=>`<div class="stat"><b>${v}</b>${k}</div>`).join("");
}
function renderPageList(){
	const wrap=$("#pageList"); wrap.innerHTML=""; const pages=(S.data&&S.data.pages)||[]; $("#pageCount").textContent=pages.length;
	if(!pages.length){ wrap.appendChild(el("div","empty","No pages yet.")); return; }
	for(const p of pages){
		const key=pageKey(p.id); const item=el("div","nl-item"+(S.selected===key?" sel":""));
		item.innerHTML=`<span class="dot" style="background:${esc(clusterColor(p.cluster))}"></span><span class="lbl">${esc(p.title)}</span><span class="meta">${esc(p.cluster_label||"page")}</span><span class="row-actions"><button class="ghost danger icon" title="Delete page">×</button></span>`;
		item.onclick=()=>select(p.id,"page");
		item.querySelector("button").onclick=(e)=>{ stop(e); deleteSelected("page",p.id); };
		wrap.appendChild(item);
	}
}
function renderNodeList(){
	const wrap=$("#nodeList"); wrap.innerHTML=""; const nodes=(S.data&&S.data.nodes)||[]; $("#nlCount").textContent=nodes.length;
	if(!nodes.length){ wrap.appendChild(el("div","empty","No nodes yet.")); return; }
	for(const n of [...nodes].sort((a,b)=>(b.updated_at||0)-(a.updated_at||0))){
		const key=nodeKey(n.id); const item=el("div","nl-item"+(S.selected===key?" sel":""));
		item.innerHTML=`<span class="dot" style="background:${esc(clusterColor(n.cluster)||catColor(n.category))}"></span><span class="lbl">${esc(n.label)}</span><span class="meta">${esc(n.category)}</span><span class="row-actions"><button class="ghost danger icon" title="Delete node">×</button></span>`;
		item.onclick=()=>select(n.id,"node");
		item.querySelector("button").onclick=(e)=>{ stop(e); deleteSelected("node",n.id); };
		wrap.appendChild(item);
	}
}
function renderCandidates(){
	const wrap=$("#candList"); wrap.innerHTML=""; const cands=(S.data&&S.data.candidates)||[]; $("#candCount").textContent=cands.length;
	if(!cands.length){ wrap.appendChild(el("div","empty","None.")); return; }
	for(const c of cands){

function nodeScore(n){

	return importance + (n.summary?2:0) + (n.slices?.length||0)*2 + (n.events?.length||0)*3 + Number(n.heat_score||0) + (["project","system","family","health"].includes(n.category)?2:0);

function isWeakNode(n){
	const words=String(n.label||"").trim().split(/\s+/).filter(Boolean).length;
	return n.health_state === "junk" || n.archived_at || n.suppressed_at || (words >= 7 && !n.summary && (n.slices?.length||0)===0 && (n.events?.length||0)===0);

function clusterLayout(id,count){
	const c=clusterInfo(id); const base=c.layout || c;
	const n=Math.max(1,Number(count || c.count || 1));
	return {
		x:Number(base.x ?? c.x ?? 0), y:Number(base.y ?? c.y ?? 0),
		radiusX:Number(base.radiusX ?? Math.min(460,Math.max(210,160+Math.sqrt(n)*68))),

function positionInCluster(clusterId,index,total,kind,item){
	const l=clusterLayout(clusterId,total);
	if(kind==="page") return {x:Math.round(l.x - Math.min(95,l.radiusX*.28) + index*52), y:Math.round(l.y - Math.min(48,l.radiusY*.25) + index*18)};
	const score=nodeScore(item || {});
	const orderedIndex=index + 1;
	const center = score >= 7 || orderedIndex === 1;
	if(center) return {x:Math.round(l.x + (orderedIndex%2)*34), y:Math.round(l.y + (orderedIndex%3)*22)};
	const ring=Math.ceil(Math.sqrt(orderedIndex));
	const angle=((orderedIndex*137.508)%360)*Math.PI/180;
	let rx=Math.min(l.radiusX-70,70+ring*38);
	let ry=Math.min(l.radiusY-58,48+ring*28);
	if(isWeakNode(item||{})){ rx=Math.max(rx,l.radiusX-74); ry=Math.max(ry,l.radiusY-58); }
	return {x:Math.round(l.x+Math.cos(angle)*rx),y:Math.round(l.y+Math.sin(angle)*ry)};
}

function drawClusterIslands(ctx){

function drawGraph(){
	const nodes=(S.data&&S.data.nodes)||[], pages=(S.data&&S.data.pages)||[], edges=(S.data&&S.data.edges)||[];
	const errBox=$("#graphErr"), cont=$("#graph");
	const showErr=(m)=>{ if(errBox){errBox.style.display="flex";errBox.innerHTML=m;} if(cont)cont.style.display="none"; };
	if(errBox){errBox.style.display="none";errBox.innerHTML="";} if(cont)cont.style.display="block";
	const present=(S.data?.clusters||[]).filter(c=>c.count>0);
	$("#legend").innerHTML=present.map(c=>`<span><span class="dot" style="background:${esc(c.color)}"></span>${esc(c.label)} (${c.count})</span>`).join("");
	if(!nodes.length && !pages.length){ showErr(`<div class="graph-empty"><b>No memories in ${esc(S.graphMode)} view</b><br><span class="help">Try All View, Test tab, or your MCP connector.</span></div>`); return; }
	if(typeof vis==="undefined" || !vis.Network){ showErr(`<div>Graph library couldn't load.<br><span class="help">Your memories are still visible in Table and Cards.</span></div>`); return; }
	try{
		const nodeIds=new Set(nodes.map(n=>n.id));
		const graphEdges=edges.filter(e=>nodeIds.has(e.from_node)&&nodeIds.has(e.to_node));
		const clusterGroups=new Map(), pageGroups=new Map();
		for(const n of [...nodes].sort((a,b)=>nodeScore(b)-nodeScore(a)||String(a.label).localeCompare(String(b.label)))){
			const k=n.cluster||"general_memory"; if(!clusterGroups.has(k))clusterGroups.set(k,[]); clusterGroups.get(k).push(n);
		}
		for(const p of [...pages].sort((a,b)=>String(a.title).localeCompare(String(b.title)))){
			const k=p.cluster||"projects_systems"; if(!pageGroups.has(k))pageGroups.set(k,[]); pageGroups.get(k).push(p);
		}
		const graphNodes=[], pageNodes=[];
		for(const [k,group] of clusterGroups.entries()) group.forEach((n,i)=>graphNodes.push(graphNode(n,i,group.length)));
		for(const [k,group] of pageGroups.entries()) group.forEach((p,i)=>pageNodes.push(graphPage(p,i,group.length)));
		const guide=guideEdges(pages,nodes);
		S.graphNodes=new vis.DataSet([...pageNodes,...graphNodes]);
		S.graphEdges=new vis.DataSet([...graphEdges.map((e,i)=>edgeStyle(e,i,false)),...guide.map((e,i)=>edgeStyle(e,i,true))]);
		S.network=new vis.Network(cont,{nodes:S.graphNodes,edges:S.graphEdges},{

		S.network.on("doubleClick",()=>graphFit());
		S.network.once("afterDrawing",()=>setTimeout(()=>{ if(S.selected)graphFocus(S.selected); else graphFit(450); },40));
		bindGraphResize($("#graphWrap"));
		if(S.selected) S.network.selectNodes([S.selected]);
		applyFocusStyles();
	}catch(e){ showErr(`<div>Graph failed to render: ${esc(e.message)}<br><span class="help">Use Table to see your memories.</span></div>`); }
}

		["Save: I prefer simple explanations","memory · preference",()=>doSave({mode:"memory",content:"I prefer simple explanations"})],
		["Save conversation sample","digest a messy chat",()=>doSave({mode:"conversation",conversationId:"sample-chat",messages:SAMPLE_CHAT})],
		["Recall: boxing","query memory",()=>doRecall("boxing")],
		["Recall: my family","query memory",()=>doRecall("my family")]
	];
	const grid=$("#testGrid"); for(const [t,sub,fn] of tests){const b=el("button","test-btn",`${esc(t)}<small>${esc(sub)}</small>`); b.onclick=fn; grid.appendChild(b);}
}
const SAMPLE_CHAT=[{role:"user",content:"yo whats up"},{role:"assistant",content:"Not much! How can I help today?"},{role:"user",content:"I'm building a memory engine called UML, it runs on Cloudflare Workers"},{role:"user",content:"it uses D1 for storage and Vectorize for search"},{role:"user",content:"haha nice"},{role:"user",content:"I connect it to ChatGPT and Claude over MCP"},{role:"user",content:"btw I prefer simple explanations"},{role:"user",content:"whats the weather like?"}];
async function doSave(payload){ try{const r=await api("/v1/save",{method:"POST",body:JSON.stringify({userId:S.userId,...payload})}); toast(r.summary||"Saved."); setTimeout(load,700);}catch(e){toast("Save failed: "+e.message,true);} }
async function doRecall(query){ try{const r=await api("/v1/recall",{method:"POST",body:JSON.stringify({userId:S.userId,query})}); toast(r.context?`Recall "${query}":\n${r.context}`:`Recall "${query}": nothing found.`);}catch(e){toast("Recall failed: "+e.message,true);} }
async function postAction(path,payload){ return api(path,{method:"POST",body:JSON.stringify({userId:S.userId,...payload})}); }
async function deleteLastRun(){ if(!confirm("Delete objects created by the most recent extraction?"))return; try{const r=await postAction("/v1/actions/delete-last-extraction",{}); toast(r.deleted?`Deleted last extraction ${r.extraction_run_id}.`:(r.reason||"Nothing deleted.")); await load();}catch(e){toast("Delete failed: "+e.message,true);} }
async function clearFailedReceipts(){ if(!confirm("Clear failed/zero-save receipts?"))return; try{const r=await postAction("/v1/actions/clear-failed-receipts",{}); toast(`Cleared ${r.changes||0} receipt(s).`); await load();}catch(e){toast("Clear failed: "+e.message,true);} }
async function deleteAllMemory(){
	const confirmText=prompt("Type DELETE ALL to permanently reset this user's memory.");
	if(confirmText!=="DELETE ALL") return;
	try{const r=await postAction("/v1/actions/delete-all-memory",{confirm:confirmText}); const c=r.counts||{}; toast(`Deleted ${c.memory_pages||0} page(s), ${c.nodes||0} node(s), ${c.slices||0} slice(s), ${c.events||0} event(s), ${c.edges||0} edge(s).`); S.selected=null; await load();}catch(e){toast("Delete all failed: "+e.message,true);}
}
async function cleanJunkNodes(){
	try{
		const preview=await postAction("/v1/actions/cleanup-junk-nodes",{dryRun:true});
		if(!preview.count){ toast("No junk sentence-fragment nodes found."); return; }
		const sample=preview.candidates.slice(0,8).map(x=>`• ${x.label} — ${x.reason}`).join("\n");
		const confirmText=prompt(`Found ${preview.count} junk node(s):\n${sample}${preview.count>8?"\n…":""}\n\nType CLEAN JUNK to archive/suppress them.`);
		if(confirmText!=="CLEAN JUNK") return;
		const r=await postAction("/v1/actions/cleanup-junk-nodes",{confirm:confirmText});
		toast(`Cleaned ${r.archived||0} junk node(s).`);
		await load();
	}catch(e){toast("Clean junk failed: "+e.message,true);}
}
async function organizeClusters(){ try{const r=await postAction("/v1/actions/organize-clusters",{}); toast(`Organized clusters. Updated ${r.updated||0} item(s).`); await load(); if(S.view==="graph") setTimeout(()=>graphFit(260),220);}catch(e){toast("Organize failed: "+e.message,true);} }
async function deleteSelected(kind,id){ if(!confirm(`Delete this ${kind}? Future extraction will suppress the same title/key.`))return; try{await postAction("/v1/actions/delete-object",{kind,id,suppress:true}); toast("Deleted."); S.selected=null; await load();}catch(e){toast("Delete failed: "+e.message,true);} }
async function archiveSelected(kind,id){ if(!confirm(`Archive this ${kind}?`))return; try{await postAction("/v1/actions/archive-object",{kind,id}); toast("Archived."); S.selected=null; await load();}catch(e){toast("Archive failed: "+e.message,true);} }
function viewSetup(v){
	const wrap=el("div"); wrap.innerHTML=`<div class="box"><h3>Your MCP connector URL</h3><div class="mcp-url" id="setupUrl">${esc(mcpUrl())}</div><div style="margin-top:9px"><button class="mini" onclick="copyText(mcpUrl(),'MCP URL copied')">Copy URL</button></div><div class="help" style="margin-top:9px">This URL embeds <code>userId:key</code>. Treat it like a password. To rotate, change the global <code>API_KEY</code> secret and regenerate connector URLs.</div></div><div class="box"><h3>Connect ChatGPT</h3><ol class="steps"><li>Settings → Connectors → <b>Add custom connector</b> or Developer mode → MCP.</li><li>Paste the URL above. No auth headers needed — identity is in the URL.</li><li>Enable <code>save_memory</code>, <code>save_conversation</code>, and <code>recall_memory</code>.</li></ol></div><div class="box"><h3>Connect Claude</h3><ol class="steps"><li>Settings → Connectors → <b>Add custom connector</b>.</li><li>Paste the URL above.</li><li>Approve the three memory tools when prompted.</li></ol></div>`; v.appendChild(wrap);
}
function viewDev(v){
	const active=(S.data&&S.data.model)||"—"; const models=(S.data&&S.data.models)||[];
	const wrap=el("div"); wrap.innerHTML=`<div class="box"><h3>Extraction model</h3><div class="help" style="margin-bottom:9px">The active extraction model is configured server-side via <code>LLM_MODEL</code>.</div><select style="min-width:320px">${models.map(m=>`<option ${m===active?"selected":""}>${esc(m)}</option>`).join("")||`<option>${esc(active)}</option>`}</select><div style="margin-top:12px" class="kv">Active: <b>${esc(active)}</b></div><div class="kv" style="margin-top:4px">Pass-2 summaries and digest use cheaper models; embeddings use <code>bge-base-en</code>.</div></div>`; v.appendChild(wrap);
}
function select(id,kind="node"){
	if(String(id).startsWith("node:")||String(id).startsWith("page:")) S.selected=id; else S.selected=itemKey(kind,id);
	renderPageList(); renderNodeList(); renderDetail();
	if(S.network && S.view==="graph"){ setTimeout(()=>{ try{S.network.setSize("100%","100%");S.network.redraw();}catch{} graphFocus(S.selected); },160); }
}
function renderDetail(){
	const d=$("#detail"), main=$("#main"); const p=selectedPage(); if(p) return renderPageDetail(p);
	const n=selectedNode(); if(!n){main.classList.remove("detail-open"); d.innerHTML=""; return;}
	main.classList.add("detail-open"); const cur=(n.slices||[]).filter(s=>s.is_current), old=(n.slices||[]).filter(s=>!s.is_current), evs=[...(n.events||[])].sort((a,b)=>(b.created_at||0)-(a.created_at||0));
	const edges=(S.data.edges||[]).filter(e=>e.from_node===n.id||e.to_node===n.id); const nameOf=(id)=>(S.data.nodes.find(x=>x.id===id)||{}).label||"?"; const state=n.health_state==="junk"?"junk":n.state;
	d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:start;gap:8px"><h2><span class="dot" style="background:${esc(clusterColor(n.cluster)||catColor(n.category))}"></span>${esc(n.label)}${n.importance_class==="life_significant"?" 🔒":""}</h2><button class="ghost mini" onclick="closeDetail()">✕</button></div><div style="display:flex;gap:7px;margin-bottom:8px"><button class="ghost mini" onclick="archiveSelected('node','${esc(n.id)}')">Archive</button><button class="ghost mini" onclick="deleteSelected('node','${esc(n.id)}')">Delete</button></div><div class="sub">${esc(n.category)} · ${esc(n.cluster_label||"")} · <span class="badge state-${esc(state)}">${esc(state)}</span></div>${n.summary?`<div class="help" style="font-style:italic">${esc(n.summary)}</div>`:""}<div class="d-sec">Current details (${cur.length})</div>${cur.length?cur.map(s=>`<div class="slice">${esc(s.text)}<span class="k">${esc(s.kind)}</span></div>`).join(""):`<div class="empty" style="padding:6px">None.</div>`}${old.length?`<div class="d-sec">Superseded (${old.length})</div>`+old.map(s=>`<div class="slice old">${esc(s.text)}<span class="k">${esc(s.kind)}</span></div>`).join(""):""}<div class="d-sec">Event timeline (${evs.length})</div>${evs.length?evs.map(e=>`<div class="event"><b>${esc((e.action||"").replace(/_/g," "))}</b>${e.importance&&e.importance!=="ordinary"?`<span class="badge imp-${esc(e.importance)}" style="margin-left:6px">${esc(e.importance.replace(/_/g," "))}</span>`:""}<div class="kv">${esc(e.text||"")}</div><span class="when">${fmtDate(e.created_at)}</span></div>`).join(""):`<div class="empty" style="padding:6px">None.</div>`}<div class="d-sec">Connections (${edges.length})</div>${edges.length?edges.map(e=>{const out=e.from_node===n.id, other=out?e.to_node:e.from_node; return `<div class="edge-row" style="cursor:pointer" onclick="select('${esc(other)}','node')">${out?"→":"←"} <b>${esc((e.type||"related_to").replace(/_/g," "))}</b> ${esc(nameOf(other))}</div>`;}).join(""):`<div class="empty" style="padding:6px">None.</div>`}`;
}
function renderPageDetail(p){
	const d=$("#detail"), main=$("#main"); main.classList.add("detail-open"); let related=[], evidence=[];
	try{related=JSON.parse(p.related_concepts_json||"[]");}catch{} try{evidence=JSON.parse(p.evidence_json||"[]");}catch{}
	d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:start;gap:8px"><h2><span class="dot" style="background:${esc(clusterColor(p.cluster))}"></span>${esc(p.title)}</h2><button class="ghost mini" onclick="closeDetail()">✕</button></div><div style="display:flex;gap:7px;margin-bottom:8px"><button class="ghost mini" onclick="archiveSelected('page','${esc(p.id)}')">Archive</button><button class="ghost mini" onclick="deleteSelected('page','${esc(p.id)}')">Delete</button></div><div class="sub">memory page · ${esc(p.source_mode||"manual_collect")} · ${esc(p.cluster_label||"")} · <span class="badge state-active">${esc(p.health_state||"active")}</span></div>${p.short_summary?`<div class="help" style="font-style:italic">${esc(p.short_summary)}</div>`:""}<div class="d-sec">Page</div><div class="page-md">${esc(p.full_markdown||"")}</div><div class="d-sec">Related concepts (${related.length})</div>${related.length?related.map(x=>`<span class="chip" style="margin:2px">${esc(x)}</span>`).join(""):`<div class="empty" style="padding:6px">None.</div>`}<div class="d-sec">Evidence (${evidence.length})</div>${evidence.length?evidence.slice(0,8).map(e=>`<div class="slice">${esc(e.snippet||"")}<span class="k">${esc(e.source_type||"source")} ${e.timestamp?"· "+fmtDate(e.timestamp):""}</span></div>`).join(""):`<div class="empty" style="padding:6px">None.</div>`}<div class="d-sec">Receipt</div><div class="kv">run <b>${esc(p.extraction_run_id||"")}</b></div>`;
}
function closeDetail(){ S.selected=null; $("#main").classList.remove("detail-open"); $("#detail").innerHTML=""; renderPageList(); renderNodeList(); if(S.network&&S.view==="graph") setTimeout(()=>{applyFocusStyles();graphFit(260);},180); }
async function copyText(t,msg){ try{await navigator.clipboard.writeText(t);toast(msg||"Copied");}catch{toast("Copy failed — select and copy manually",true);} }
$("#load").onclick=load;
$("#copyMcp").onclick=()=>{ if(!S.userId||!S.key)return toast("Enter userId + key first",true); copyText(mcpUrl(),"MCP URL copied"); };
$("#userId").addEventListener("keydown",e=>{if(e.key==="Enter")load();});
$("#key").addEventListener("keydown",e=>{if(e.key==="Enter")load();});
$("#tabs").addEventListener("click",e=>{const t=e.target.closest(".tab"); if(t)setView(t.dataset.view);});
renderView();
if(S.userId && S.key) load();
</script>
</body>
</html>
